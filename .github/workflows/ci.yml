name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Check formatting
        run: npx prettier --check "**/*.{js,ts,json}"

  unit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run unit tests
        run: npm test

  integration-mock:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests (mock backend)
        run: npm run test:integration:mock

  integration-real:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Start Redis (cluster + standalone)
        run: docker compose -f docker-compose.test.yml up -d --wait

      - name: Run integration tests (real backend)
        env:
          # Points the harness at the standalone service for SELECT/multi-DB
          # tests that cluster mode cannot serve (see test-config.ts).
          REDIS_STANDALONE_PORT: 6399
          # Password-protected standalone for AUTH/NOAUTH enforcement tests.
          REDIS_STANDALONE_AUTH_PORT: 6400
        run: npm run test:integration:real

      - name: Stop Redis (cluster + standalone)
        if: always()
        run: docker compose -f docker-compose.test.yml down -v
