services:
  # Redis Cluster using grokzen/redis-cluster
  redis-cluster:
    image: grokzen/redis-cluster:7.0.14
    ports:
      - '30000-30005:30000-30005'
    environment:
      # Configure cluster to start at port 8000 instead of default 7000
      INITIAL_PORT: 30000
      # 3 masters with 1 slave each (default, but explicit)
      MASTERS: 3
      SLAVES_PER_MASTER: 1
      # For Mac compatibility
      IP: 0.0.0.0
    healthcheck:
      # Only healthy once every slot is assigned and the cluster reports OK.
      # `get a` answers before the cluster has finished forming, which lets
      # clients connect to a half-built cluster and hang on slot lookups.
      test:
        [
          'CMD-SHELL',
          'redis-cli -p 30000 cluster info | grep -q cluster_state:ok',
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s
