services:
  # Redis Cluster using grokzen/redis-cluster
  redis-cluster:
    image: grokzen/redis-cluster:7.0.14
    ports:
      - '30000-30005:30000-30005'
    environment:
      # Configure cluster to start at port 8000 instead of default 7000
      INITIAL_PORT: 30000
      # 3 masters with 1 slave each (default, but explicit)
      MASTERS: 3
      SLAVES_PER_MASTER: 1
      # For Mac compatibility
      IP: 0.0.0.0
    healthcheck:
      # Only healthy once every slot is assigned and the cluster reports OK.
      # `get a` answers before the cluster has finished forming, which lets
      # clients connect to a half-built cluster and hang on slot lookups.
      test:
        [
          'CMD-SHELL',
          'redis-cli -p 30000 cluster info | grep -q cluster_state:ok',
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  # Standalone (non-cluster) Redis. Cluster mode rejects SELECT and exposes a
  # single logical database, so integration tests that need multiple databases
  # or SELECT (e.g. SELECT inside MULTI/EXEC) connect here instead. The harness
  # uses it when REDIS_STANDALONE_PORT is set; see tests-integration/test-config.ts.
  redis-standalone:
    image: redis:7.2
    ports:
      - '6399:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', '-p', '6379', 'ping']
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 5s

  # Password-protected standalone Redis (requirepass). The default password-less
  # services cannot exercise AUTH/NOAUTH enforcement, so auth integration tests
  # connect here. The harness uses it when REDIS_STANDALONE_AUTH_PORT is set;
  # see tests-integration/test-config.ts (STANDALONE_AUTH_PASSWORD).
  redis-standalone-auth:
    image: redis:7.2
    command:
      [
        'redis-server',
        '--requirepass',
        'testpass',
        '--save',
        '',
        '--appendonly',
        'no',
      ]
    ports:
      - '6400:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', '-p', '6379', '-a', 'testpass', 'ping']
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 5s
